  <text x="216" y="280" font-family="SF Mono, Menlo, monospace" font-size="12" fill="#569cd6"> this</text>
  <text x="248" y="280" font-family="SF Mono, Menlo, monospace" font-size="12" fill="#cccccc">.cache.get(file);</text>
